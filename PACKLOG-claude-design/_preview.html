<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>
  <style>body{margin:0;padding:20px;background:#E8E3D8;display:flex;gap:20px;flex-wrap:wrap;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components/primitives.jsx"></script>
  <script type="text/babel" src="components/screens-mobile-1.jsx"></script>
  <script type="text/babel" src="components/screens-mobile-2.jsx"></script>
  <script type="text/babel" src="components/screens-mobile-3.jsx"></script>
  <script type="text/babel">
    const Frame = ({title, children}) => (
      <div>
        <div style={{fontFamily:'var(--mono)', fontSize:10, color:'#666', marginBottom:6}}>{title}</div>
        <div style={{width:390, height:780, background:'var(--paper)', border:'1px solid #ccc', overflow:'hidden', borderRadius:12, position:'relative'}}>{children}</div>
      </div>
    );
    const App = () => (
      <>
        <Frame title="HOME"><ScreenHome lang="zh"/></Frame>
        <Frame title="DETAIL"><ScreenTripDetail lang="zh" heroStyle="split"/></Frame>
        <Frame title="CONTAINERS"><ScreenContainers lang="zh"/></Frame>
        <Frame title="SHARE"><ScreenShare lang="zh"/></Frame>
        <Frame title="REVIEW"><ScreenReview lang="zh"/></Frame>
        <Frame title="EXPLORE"><ScreenExplore lang="zh"/></Frame>
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
